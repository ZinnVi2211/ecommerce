{% extends 'shops/base.html' %}
{% block title %}Xác nhận xóa | MotoShop{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm border-0 text-center" style="border-radius: 12px; border-top: 5px solid #dc3545 !important;">
                <div class="card-body p-4 p-md-5">
                    <div class="mb-4">
                        <div class="d-inline-flex border border-danger rounded-circle p-3 mb-3">
                            <i class="bi bi-exclamation-triangle-fill text-danger" style="font-size: 3rem;"></i>
                        </div>
                        <h3 class="fw-bold text-dark">Bạn có chắc chắn muốn xóa?</h3>
                        <p class="text-muted mt-2">Hành động này sẽ xóa vĩnh viễn sản phẩm <br><strong class="text-danger fs-5">{{ product.name }}</strong><br> khỏi hệ thống MotoShop và không thể hoàn tác.</p>
                    </div>

                    <form method="post">
                        {% csrf_token %}
                        <div class="d-flex justify-content-center gap-3 mt-4">
                            <a href="{% url 'shops:product_list' %}" class="btn btn-light border fw-bold px-4 rounded-pill">
                                Hủy bỏ
                            </a>
                            <button type="submit" class="btn btn-danger fw-bold px-4 rounded-pill">
                                <i class="bi bi-trash me-1"></i> Đồng ý Xóa
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
