{% extends "users/base.html" %}
{% block title %}Đăng nhập | MotoShop{% endblock %}

{% block content %}
<style>
  .login-container {
    min-height: 80vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 2rem 0;
  }

  .login-card {
    width: 100%;
    max-width: 420px;
    padding: 36px;
    border-radius: 12px;
    background: #ffffff;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
    border-top: 5px solid #ff3333;
  }

  .login-header {
    text-align: center;
    margin-bottom: 24px;
  }

  .login-header i {
    font-size: 42px;
    color: #ff3333;
  }

  .login-header h2 {
    margin-top: 10px;
    font-weight: 800;
    color: #1a1a1a;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .login-desc {
    font-size: 14px;
    color: #6c757d;
  }

  /* FORM */
  .login-card form p {
    margin-bottom: 16px;
  }

  .login-card label {
    font-weight: 600;
    margin-bottom: 8px;
    display: block;
    color: #1a1a1a;
  }

  .login-card input[type="text"],
  .login-card input[type="password"],
  .login-card input[type="email"] {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #ced4da;
    outline: none;
    transition: 0.2s;
  }

  .login-card input:focus {
    border-color: #ff3333;
    box-shadow: 0 0 0 0.25rem rgba(255, 51, 51, 0.25);
  }

  .login-card input[type="submit"] {
    width: 100%;
    padding: 12px;
    background-color: #ff3333;
    border: none;
    color: #fff;
    font-weight: 700;
    border-radius: 30px;
    cursor: pointer;
    transition: all 0.3s ease;
    margin-top: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .login-card input[type="submit"]:hover {
    background-color: #e60000;
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(255, 51, 51, 0.4);
  }

  /* LINKS */
  .login-links {
    margin-top: 24px;
    text-align: center;
    font-size: 14px;
  }

  .login-links a {
    color: #ff3333;
    text-decoration: none;
    font-weight: 600;
    transition: color 0.3s ease;
  }

  .login-links a:hover {
    color: #cc0000;
    text-decoration: underline;
  }
</style>

<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <i class="bi bi-motorcycle"></i>
      <h2>MotoShop</h2>
      <div class="login-desc">
        Đăng nhập để sở hữu ngay chiếc xe mơ ước của bạn
      </div>
    </div>

    <form action="{% url 'users:login' %}" method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <p>
        <input type="submit" value="Đăng nhập" />
      </p>
    </form>

    <div class="login-links">
      <p>
        <a href="{% url 'users:password_reset' %}">
          Quên mật khẩu?
        </a>
      </p>
      <p>
        Chưa có tài khoản?
        <a href="{% url 'users:register' %}">Đăng ký ngay</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
