{% extends "users/base.html" %}
{% block title %}Email đã được gửi | TechStore{% endblock %}

{% block content %}
<style>
.reset-done-card {
  max-width: 520px;
  padding: 36px;
  border-radius: 18px;
  background: #fff;
  box-shadow: 0 14px 40px rgba(229,57,53,.25);
  text-align: center;
}
.reset-icon {
  font-size: 56px;
  color: #e53935;
}
</style>

<div class="container d-flex justify-content-center align-items-center" style="min-height:80vh;">
  <div class="reset-done-card">

    <div class="reset-icon mb-3">
      <i class="bi bi-envelope-check-fill"></i>
    </div>

    <h3>Email khôi phục đã được gửi</h3>

    <p class="text-muted mt-2">
      Nếu email tồn tại trong hệ thống, bạn sẽ nhận được hướng dẫn
      đặt lại mật khẩu trong vài phút.
    </p>

    <a href="{% url 'users:login' %}" class="btn btn-danger mt-3">
      Quay lại đăng nhập
    </a>

  </div>
</div>
{% endblock %}
