{% extends "users/base.html" %}
{% block title %}Cập nhật thành công | TechStore{% endblock %}

{% block content %}
<style>
.edit-done-card{
  max-width:460px;
  padding:36px;
  border-radius:18px;
  background:#fff;
  box-shadow:0 14px 40px rgba(229,57,53,.25);
  text-align:center;
}
.edit-done-icon{
  font-size:56px;
  color:#22c55e;
}
</style>

<div class="container d-flex justify-content-center align-items-center" style="min-height:80vh;">
  <div class="edit-done-card">

    <div class="edit-done-icon mb-3">
      <i class="bi bi-check-circle-fill"></i>
    </div>

    <h3>Cập nhật hồ sơ thành công</h3>

    <p class="text-muted mt-2">
      Thông tin tài khoản của bạn đã được lưu an toàn tại
      <strong class="text-danger">TechStore</strong>.
    </p>

    <a href="{% url 'users:profile' %}" class="btn btn-danger mt-3">
      Quay lại tài khoản
    </a>

  </div>
</div>
{% endblock %}
