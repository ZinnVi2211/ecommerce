{% extends "users/base.html" %}
{% block title %}Đặt mật khẩu mới | TechStore{% endblock %}

{% block content %}
<style>
.reset-confirm-card {
  max-width: 420px;
  padding: 36px;
  border-radius: 18px;
  background: #fff;
  box-shadow: 0 14px 40px rgba(229,57,53,.25);
}

.reset-confirm-icon {
  font-size: 48px;
  color: #e53935;
}

.reset-confirm-card input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ddd;
}

.reset-confirm-btn {
  width: 100%;
  padding: 12px;
  background: linear-gradient(135deg,#e53935,#c62828);
  border: none;
  color: #fff;
  font-weight: 700;
  border-radius: 10px;
}
</style>

<div class="container d-flex justify-content-center align-items-center" style="min-height:80vh;">
  <div class="reset-confirm-card">

    <div class="text-center mb-3">
      <i class="bi bi-shield-lock-fill reset-confirm-icon"></i>
      <h3 class="mt-2">Đặt mật khẩu mới</h3>
      <p class="text-muted small">
        Nhập mật khẩu mới để tiếp tục mua sắm
      </p>
    </div>

    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="reset-confirm-btn mt-2">
        Cập nhật mật khẩu
      </button>
    </form>

  </div>
</div>
{% endblock %}
