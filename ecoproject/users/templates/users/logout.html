{% extends "users/base.html" %}
{% block title %}Đã đăng xuất | MotoShop{% endblock %}

{% block content %}
<style>
.logout-card{
  max-width:480px;
  padding:40px;
  border-radius:12px;
  background:#fff;
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
  text-align:center;
  border-top: 5px solid #28a745;
}

.logout-icon{
  font-size:64px;
  color:#28a745;
  margin-bottom: 20px;
}

.logout-card h3 {
    font-weight: 800;
    color: #1a1a1a;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}
</style>

<div class="container d-flex justify-content-center align-items-center" style="min-height:75vh;">
  <div class="logout-card">

    <div class="logout-icon">
      <i class="bi bi-check-circle-fill"></i>
    </div>

    <h3 class="mb-3">Đăng xuất thành công</h3>

    <p class="text-muted mb-4 fs-5">
      Bạn đã đăng xuất khỏi
      <strong class="text-danger">MotoShop</strong>.<br>
      Khởi đầu đam mê, hẹn gặp lại bạn!
    </p>

    <div class="d-flex justify-content-center gap-3 flex-wrap mt-4">
      <a href="{% url 'users:login' %}" class="btn btn-primary-custom" style="padding: 0.6rem 2rem;">
        Đăng nhập lại
      </a>
      <a href="{% url 'shops:index' %}" class="btn btn-outline-dark fw-bold" style="border-radius: 30px; padding: 0.6rem 2rem;">
        Về trang chủ
      </a>
    </div>

  </div>
</div>
{% endblock %}
