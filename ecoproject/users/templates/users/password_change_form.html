{% extends "users/base.html" %}
{% block title %}Đổi mật khẩu | TechStore{% endblock %}

{% block content %}
<style>
.password-container{
  min-height:80vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.password-card{
  max-width:420px;
  width:100%;
  padding:36px;
  border-radius:18px;
  background:#fff;
  box-shadow:0 14px 40px rgba(229,57,53,.25);
}

.password-header{
  text-align:center;
  margin-bottom:24px;
}

.password-header i{
  font-size:44px;
  color:#e53935;
}

.password-header h3{
  margin-top:8px;
  font-weight:800;
}

.password-desc{
  font-size:14px;
  color:#777;
}

.password-card input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #ddd;
}

.password-card input:focus{
  border-color:#e53935;
  box-shadow:0 0 0 2px rgba(229,57,53,.15);
}

.password-btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,#e53935,#c62828);
  color:#fff;
  font-weight:700;
  transition:.3s;
}

.password-btn:hover{
  transform:translateY(-1px);
  box-shadow:0 8px 18px rgba(229,57,53,.45);
}
</style>

<div class="password-container">
  <div class="password-card">

    <div class="password-header">
      <i class="bi bi-shield-lock-fill"></i>
      <h3>Đổi mật khẩu</h3>
      <div class="password-desc">
        Bảo mật tài khoản TechStore của bạn
      </div>
    </div>

    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}

      <button type="submit" class="password-btn mt-2">
        Cập nhật mật khẩu
      </button>
    </form>

  </div>
</div>
{% endblock %}
