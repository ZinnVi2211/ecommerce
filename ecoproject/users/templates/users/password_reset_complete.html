{% extends "users/base.html" %}
{% block title %}Hoàn tất | TechStore{% endblock %}

{% block content %}
<style>
.reset-complete-card {
  max-width: 480px;
  padding: 36px;
  border-radius: 18px;
  background: #fff;
  box-shadow: 0 14px 40px rgba(229,57,53,.25);
  text-align: center;
}

.reset-complete-icon {
  font-size: 56px;
  color: #22c55e;
}
</style>

<div class="container d-flex justify-content-center align-items-center" style="min-height:75vh;">
  <div class="reset-complete-card">

    <div class="reset-complete-icon mb-3">
      <i class="bi bi-check-circle-fill"></i>
    </div>

    <h4>Đặt lại mật khẩu thành công</h4>

    <p class="text-muted mt-2">
      Bạn có thể đăng nhập và tiếp tục mua sắm tại
      <strong class="text-danger">TechStore</strong>.
    </p>

    <a href="{% url 'users:login' %}" class="btn btn-danger mt-3">
      Đăng nhập ngay
    </a>

  </div>
</div>
{% endblock %}
