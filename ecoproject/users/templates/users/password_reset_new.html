{% extends "users/base.html" %}
{% block title %}Dat lai mat khau | TechStore{% endblock %}

{% block content %}
<style>
.reset-container {
  min-height: 80vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.reset-card {
  max-width: 420px;
  width: 100%;
  padding: 36px;
  border-radius: 18px;
  background: #fff;
  box-shadow: 0 14px 40px rgba(229,57,53,0.25);
}

.reset-header {
  text-align: center;
  margin-bottom: 24px;
}

.reset-header i {
  font-size: 44px;
  color: #e53935;
}

.reset-header h2 {
  margin-top: 8px;
  font-weight: 800;
  color: #e53935;
}

.reset-desc {
  font-size: 14px;
  color: #777;
}

.reset-card input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ddd;
}

.reset-card input:focus {
  border-color: #e53935;
  box-shadow: 0 0 0 2px rgba(229,57,53,.15);
}

.reset-btn {
  width: 100%;
  padding: 12px;
  background: linear-gradient(135deg,#e53935,#c62828);
  border: none;
  color: #fff;
  font-weight: 700;
  border-radius: 10px;
}
</style>

<div class="reset-container">
  <div class="reset-card">

    <div class="reset-header">
      <i class="bi bi-key-fill"></i>
      <h2>TechStore</h2>
      <div class="reset-desc">
        Dat lai mat khau moi
      </div>
    </div>

    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="reset-btn mt-2">
        Cap nhat mat khau
      </button>
    </form>

  </div>
</div>
{% endblock %}
