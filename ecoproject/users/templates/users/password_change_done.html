{% extends "users/base.html" %}
{% block title %}Đổi mật khẩu thành công | QShop{% endblock %}

{% block content %}
<style>
.password-done-card {
  max-width: 480px;
  width: 100%;
  border-radius: 16px;
  padding: 32px;
  text-align: center;
  background: #ffffff;
  box-shadow: 0 10px 30px rgba(0,0,0,0.12);
  transition: 0.3s;
}

body.dark-mode .password-done-card {
  background: #1c1f26;
  box-shadow: 0 10px 30px rgba(0,0,0,0.6);
}

.password-done-icon {
  font-size: 52px;
  color: #22c55e;
}

.password-done-btn {
  min-width: 200px;
  padding: 10px 18px;
  border-radius: 8px;
  background: linear-gradient(135deg,#4f46e5,#6366f1);
  border: none;
  color: #fff;
  font-weight: bold;
  transition: 0.3s;
}

.password-done-btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 15px rgba(79,70,229,0.4);
}
</style>

<div class="container d-flex justify-content-center align-items-center" style="min-height:80vh;">
  <div class="password-done-card">

    <div class="password-done-icon mb-2">
      <i class="bi bi-check-circle-fill"></i>
    </div>

    <h3 class="mb-2">Đổi mật khẩu thành công</h3>

    <p class="text-muted mt-2">
      Mật khẩu của bạn đã được cập nhật an toàn.  
      Bạn có thể đăng nhập lại để tiếp tục mua sắm tại <strong>QShop</strong>.
    </p>

    <a href="{% url 'users:login' %}" class="password-done-btn mt-3 d-inline-block">
      <i class="bi bi-box-arrow-in-right me-1"></i> Đăng nhập lại
    </a>

  </div>
</div>
{% endblock %}
